name: life_safety
description: "Bina Yangın Risk Analizi Uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  shared_preferences: ^2.3.5
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.10.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/ui/
    - assets/images/sections/
    - assets/intro_video.mp4

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700