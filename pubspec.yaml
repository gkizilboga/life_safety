name: life_safety
description: "Bina Yangın Risk Analizi Uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  shared_preferences: ^2.3.5
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.10.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  fl_chart: ^0.70.2
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/ui/logo3.webp"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/ui/
    - assets/images/sections/
    - assets/intro_video.mp4

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
        - asset: assets/fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic

flutter_native_splash:
  color: "#1A237E"